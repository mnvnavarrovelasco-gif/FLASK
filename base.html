<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}One Piece Flask{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="{{ url_for('index') }}">One Piece Flask</a>
            <nav class="main-nav">
                <a href="{{ url_for('index') }}">Inicio</a>
                <a href="{{ url_for('personajes') }}">Personajes</a>
            </nav>
        </div>
    </header>

    <main id="contenido" class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <p>Hecho por: María Navarro Velasco</p>
            <p>1º ASIR 25/26</p>
        </div>
    </footer>
</body>
</html>
